<!doctype html>
<head>
    <link href="css/tabulator.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <script src="js/script.js"></script>
    <script src="js/jszip.min.js"></script>
    <script src="js/FileSaver.js"></script>
    <script src="js/tabulator.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.2/xlsx.full.min.js"></script>
</head>

<body>
    <div id="main">
        <input type="file" id="inputFolder"
            webkitdirectory multiple 
            onchange="uploadFiles(event);">

        <select id="filesList" 
            multiple 
            ondrop="drop(event);"
            ondragover="allowDrop(event);" 
            onchange="updateListSelection(this, this.selectedIndex);"
            size="10">
            <!-- No options here - they are populated when files are uploaded during runtim. -->
        </select>
    </div>

    <div id="center"></div>
        <img id="previewImage" height="500">

        <canvas id="svgCanvas"></canvas>

        <!-- very hacky solution, seems to work despite security issues?-->
        <textarea placeholder="Enter SVG Syntax" 
            id="svgSource"
            rows=50
            cols=70
            oninput="triggerSVGChange(this.value);">
<svg width="500" height="800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <image xlink:href="römerkloppe/Artworks/$(ArtworkURL)" x="0" y="0" width="500" height="800" preserveAspectRatio="xMinYMin slice"/>
    <foreignObject x="10" y="400" width="480" height="400">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <font size="10" color="#ffffff">$(Text)</font>  
        </div>
    </foreignObject>
</svg></textarea>
    </div>

    <div id="worksheetTabs" class="tab"></div>
    <div id="cardTable"></div>

    <button value="click" onclick="transformWorksheetToImages()"></button>
</body>
