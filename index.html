<!doctype html>
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="js/script.js"></script>
</head>

<body>
    <div id="main">
        <input type="file" id="inputFolder"
            webkitdirectory multiple 
            onchange="uploadFiles(event)">

        <select id="filesList" 
            multiple 
            ondrop="drop(event)"
            ondragover="allowDrop(event)" 
            onchange="updateImage(event)"
            size="10">
            <!-- No options here - they are added when files are added during runtime-->
        </select>
    </div>

    <img id="previewImage" height="500">
</body>
